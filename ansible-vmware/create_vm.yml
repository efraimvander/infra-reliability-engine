---
- name: Provisionar VM no ESXi
  hosts: vmware
  gather_facts: no
  vars_files:
    - vars.yml

  tasks:

  - name: Criar VM
    community.vmware.vmware_guest:
      hostname: "{{ vcenter_hostname }}"
      username: "{{ vcenter_username }}"
      password: "{{ vcenter_password }}"
      validate_certs: no

      name: "{{ vm_name }}"
      state: poweredon

      datacenter: "{{ datacenter }}"
      datastore: "{{ datastore }}"

      hardware:
        memory_mb: "{{ vm_ram }}"
        num_cpus: "{{ vm_cpu }}"

      disk:
        - size_gb: "{{ vm_disk }}"
          type: thin
          datastore: "{{ datastore }}"

      networks:
        - name: "{{ network }}"
          type: dhcp

      guest_id: "{{ guest_id }}"

      wait_for_ip_address: yes
